<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- MoviQ icon — squircle app-style -->
  <rect width="64" height="64" rx="15" fill="#F5C518"/>
  <!-- speed lines (movimento) -->
  <g stroke="#15110A" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="11" y1="24" x2="20" y2="24"/>
    <line x1="9"  y1="32" x2="20" y2="32"/>
    <line x1="11" y1="40" x2="20" y2="40"/>
  </g>
  <!-- Q ring -->
  <circle cx="38" cy="32" r="12.5" fill="none" stroke="#15110A" stroke-width="6.2"/>
  <!-- Q tail -->
  <line x1="41" y1="35" x2="50" y2="44"
        stroke="#15110A" stroke-width="6.2" stroke-linecap="round"/>
</svg>
