<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64">
  <!-- MoviQ logotipo: mark + wordmark -->
  <!-- ── Mark ── -->
  <g transform="translate(32 32)">
    <circle cx="0" cy="0" r="30" fill="#F5C518"/>
    <g stroke="#15110A" stroke-width="3.4" stroke-linecap="round" opacity="0.5">
      <line x1="-19" y1="-8" x2="-11" y2="-8"/>
      <line x1="-21" y1="0"  x2="-11" y2="0"/>
      <line x1="-19" y1="8"  x2="-11" y2="8"/>
    </g>
    <circle cx="5" cy="0" r="12" fill="none" stroke="#15110A" stroke-width="5.8"/>
    <line x1="8" y1="3" x2="16.5" y2="11.5" stroke="#15110A" stroke-width="5.8" stroke-linecap="round"/>
  </g>
  <!-- ── Wordmark ── -->
  <text x="78" y="44"
        font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
        font-size="40" font-weight="800" letter-spacing="-1.8">
    <tspan fill="#15110A">Movi</tspan><tspan fill="#F5C518">Q</tspan>
  </text>
</svg>
