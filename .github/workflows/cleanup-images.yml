name: Cleanup Cloudinary images

on:
  schedule:
    # ogni ora alle :15
    - cron: '15 * * * *'
  workflow_dispatch:  # manuale dal pulsante GitHub Actions

# Permessi minimi: il job usa solo secret in env, non scrive sul repo.
permissions:
  contents: read

jobs:
  cleanup:
    name: Drain image_cleanup_queue
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Action pinnate a commit SHA (anti tag-hijack / supply chain)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install minimal deps
        # Solo @supabase/supabase-js serve allo script
        run: npm ci --omit=optional

      - name: Run cleanup
        run: node scripts/cleanup-cloudinary.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
