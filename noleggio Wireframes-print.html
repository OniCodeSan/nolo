<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>noleggio.it — Wireframes (print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Kalam", system-ui, sans-serif; color: #1a1814; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .page {
    width: 1046px;
    height: 718px;
    margin: 0 auto 20px;
    background: #fbf8f0;
    box-sizing: border-box;
    padding: 24px 28px 20px;
    page-break-after: always;
    break-after: page;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .page:last-child { page-break-after: auto; break-after: auto; }
  .page-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1.4px solid #1a1814;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }
  .page-sect {
    font-family: "Caveat", cursive;
    font-size: 22px;
    font-weight: 700;
  }
  .page-sub { font-family: "Kalam", cursive; font-size: 13px; color: #5b574f; font-weight: 400; }
  .page-label {
    font-family: "Kalam", cursive;
    font-size: 14px;
    font-weight: 700;
    background: #fde68a;
    padding: 2px 10px;
    border: 1.3px solid #1a1814;
    border-radius: 8px;
    transform: rotate(-1deg);
  }
  .page-stage {
    width: 100%;
    height: calc(100% - 40px);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
  }
  .page-scale { flex-shrink: 0; }

  .page.cover {
    padding: 60px 50px;
    background: #fbf8f0;
    position: relative;
  }
  .page.divider {
    padding: 80px 50px;
    background: #fbf8f0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .div-num {
    font-family: "Caveat", cursive;
    font-size: 200px;
    font-weight: 700;
    line-height: 0.8;
    color: #fbcf3a;
    -webkit-text-stroke: 2px #1a1814;
  }
  .div-title {
    font-family: "Caveat", cursive;
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    margin-top: 10px;
  }
  .div-sub {
    font-family: "Kalam", cursive;
    font-size: 22px;
    color: #5b574f;
    margin-top: 8px;
  }

  @page { size: A4 landscape; margin: 0 ; }
  @media print {
    body { background: #fff; }
    .page {
      margin: 0;
      box-shadow: none;
      width: 297mm;
      height: 210mm;
      padding: 8mm 10mm 6mm;
    }
    .page-stage { height: calc(100% - 32px); }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

</html>
