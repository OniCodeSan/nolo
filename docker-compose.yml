services:
  dev:
    image: node:20-alpine
    container_name: moviq-dev
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    env_file:
      - path: ./.env
        required: false
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "8080:5173"
    volumes:
      - ./:/app
      - moviq_node_modules:/app/node_modules
    restart: unless-stopped

  prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      secrets:
        - dotenv
    container_name: moviq-prod
    ports:
      - "8081:80"
    restart: unless-stopped

secrets:
  dotenv:
    file: ./.env

volumes:
  moviq_node_modules:
