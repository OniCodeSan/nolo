# Header di sicurezza (parità con vercel.json). `always` per applicarli anche
# alle risposte di errore. Inclusi in ogni location che ha add_header propri.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.supabase.co https://eu.i.posthog.com https://www.clarity.ms https://plausible.io https://*.sentry-cdn.com https://*.ingest.sentry.io https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://res.cloudinary.com https://*.tile.openstreetmap.org https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.cloudinary.com https://eu.i.posthog.com https://www.clarity.ms https://*.clarity.ms https://plausible.io https://*.ingest.sentry.io https://*.sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; worker-src 'self' blob:; upgrade-insecure-requests" always;
