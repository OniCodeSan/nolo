# Header di sicurezza condivisi (allineati a vercel.json). Definiti come blocco
# riusabile: in nginx un `add_header` dentro una location ANNULLA l'ereditarietà
# dei add_header del server, quindi vanno ripetuti nelle location che ne hanno
# di propri (/, /assets/, =/index.html). Per DRY usiamo un include da
# /etc/nginx/snippets/ (path NON auto-incluso, a differenza di conf.d/).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # SPA fallback (React Router) + servizio delle pagine prerenderizzate.
    # $uri.html serve i file statici generati dal prerender, incluse le rotte
    # con prefisso lingua annidato (es. /en/blog/<slug> → /en/blog/<slug>.html).
    # Se non esiste né il file né il .html, si ricade su /index.html (SPA).
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri.html /index.html;
    }

    # Cache aggressivo per asset con hash nel nome (come produzione)
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Non cachare index.html
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compressione (come produzione)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
